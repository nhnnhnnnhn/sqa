# GPU override — use on Windows/Linux with NVIDIA GPU:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
services:
  microservice:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
